<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Collab - Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <div id="auth-card" class="card">
            <h2 id="form-title">Artist Login</h2>
            <form id="auth-form">
                <input type="text" id="artist_name" class="reg-field hidden" placeholder="Artist Name">
                <select id="role_type" class="reg-field hidden">
                    <option value="producer">Producer</option>
                    <option value="vocalist">Vocalist</option>
                    <option value="designer">Digital Artist</option>
                </select>
                <input type="text" id="tenant_id" class="reg-field hidden" placeholder="Tenant ID (e.g. tenant_default)">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="submit-btn">Let's Go</button>
            </form>
            <p style="margin-top: 1rem;"><span id="toggle-form" class="link">Create an account instead</span></p>
        </div>

        <div id="main-dashboard" class="dashboard-layout hidden">
            
            <div class="card" style="max-width: 100%; height: max-content;">
                <h2>Welcome Back, <span id="user-display-name" style="color: #04d361;">Artist</span>!</h2>
                <p style="color: #a8a8b3; font-size: 0.9rem;">Workspace: <span id="user-tenant" style="color: #8257e5; font-weight:bold;"></span></p>
                <div style="background: #121214; padding: 1rem; border-radius: 4px; text-align: left; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 1rem;">
                    <strong>Your Bio:</strong> <span id="user-bio"></span><br>
                    <strong>Role:</strong> <span id="user-role"></span>
                </div>

                <div id="signature-track-container" style="margin-bottom: 1rem;"></div>

                <button onclick="logout()" style="background: #e1e1e6; color: #121214; margin: 0; width: 100%;">Log Out</button>
            </div>

            <div class="workspace-grid">
                
                <div class="panel-box">
                    <h2 style="margin-top: 0; color: #04d361;">Discover Talent</h2>
                    <p style="color: #a8a8b3; font-size:0.9rem; margin-bottom: 1.5rem;">Find creators sorted by proximity radar.</p>
                    
                    <div class="filter-bar" style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                        <input type="text" id="role-search-input" placeholder="Type a role (e.g. rapper, producer, guitarist)..." style="margin: 0; flex: 1;">
                        <button onclick="searchProximity(true)" style="margin: 0; padding: 0 1.5rem; background: #04d361; color: #121214; font-weight: bold; width: auto;">Search</button>
                    </div>
                    
                    <div id="artist-grid" class="artist-grid"></div>

                    <div id="pagination-bar" class="hidden" style="margin-top: 1.5rem; text-align: center; border-top: 1px solid #323238; padding-top: 1rem;">
                        <button id="next-page-btn" style="background: #8257e5; color: white; width: auto; padding: 0.6rem 2rem; margin: 0;" onclick="searchProximity(false)">Next Page →</button>
                    </div>
                </div> 

                <div class="panel-box">
                    <h2 style="margin-top: 0; color: #8257e5;">Incoming Requests</h2>
                    <p style="color: #a8a8b3; font-size:0.9rem; margin-bottom: 1.5rem;">Collaboration offers targeting you.</p>
                    <div id="requests-inbox" class="requests-stack"></div>
                </div> 

                <div class="panel-box">
                    <h2 style="margin-top: 0; color: #04d361;">Your Network</h2>
                    <p style="color: #a8a8b3; font-size:0.9rem; margin-bottom: 1.5rem;">Verified creative partners in this workspace layer.</p>
                    <div id="active-connections" class="requests-stack"></div>
                </div> 

            </div> 
        </div> 
    </div> 

    <script src="/static/app.js"></script>
</body>
</html>
